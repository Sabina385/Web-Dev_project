<div class="login-page">
  <div class="login-card">
    <div class="logo-wrapper">
      <div class="logo-box"></div>
      <span class="logo-text">Movie Club</span>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Enter your details to access your movies</p>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="loginData.username" 
          required 
          placeholder="Enter your username"
        >
      </div>

     <div class="input-group">
      <label>Password</label>
      <div class="password-wrapper">
       <input 
         [type]="isPasswordVisible ? 'text' : 'password'" 
         name="password" 
         [(ngModel)]="loginData.password" 
         required
         placeholder="Enter your password"
    >
    <button type="button" class="eye-btn" (click)="togglePasswordVisibility()">
      {{ isPasswordVisible ? '👁' : '👁' }}
    </button>
  </div>
</div>

      <button type="submit" class="login-btn" [disabled]="!loginForm.form.valid">
        Sign In
      </button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
    </div>
  </div>
</div>
